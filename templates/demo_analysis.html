<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FX AI Cockpit</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{--bg:#0d1117;--bg1:#161b22;--bg2:#21262d;--border:#30363d;--t1:#e6edf3;--t2:#8b949e;--t3:#484f58;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--gold:#eab308;--purple:#a855f7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;overflow:hidden}

/* ── Top Bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;height:42px;padding:0 14px;background:var(--bg1);border-bottom:1px solid var(--border)}
.topbar h1{font-size:14px;font-weight:700;white-space:nowrap}
.topbar-r{display:flex;align-items:center;gap:10px}
.topbar a{color:var(--t2);text-decoration:none;font-size:11px}
.topbar a:hover{color:var(--t1)}
#status-text{font-size:11px;color:var(--t2)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle;transition:background .3s ease,box-shadow .3s ease}
.dot.on{background:var(--green);box-shadow:0 0 4px var(--green)}
.dot.off{background:var(--red);box-shadow:none}
.tb{background:none;border:1px solid var(--border);color:var(--t2);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:12px}
.tb:hover{color:var(--t1);border-color:var(--t2)}

/* ── Layout ── */
.cockpit{display:grid;grid-template-columns:170px 1fr;height:calc(100vh - 42px)}

/* ── Sidebar ── */
.sidebar{background:var(--bg1);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.pair-group{border-bottom:1px solid var(--border)}
.pair-header{padding:7px 10px;font-size:11px;font-weight:700;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;gap:5px;transition:all .12s;user-select:none}
.pair-header:hover{background:rgba(255,255,255,.03)}
.pair-header.active{border-left-color:var(--blue);background:rgba(59,130,246,.06);color:var(--blue)}
.pair-flag{font-size:13px}
.mode-list{padding:2px 0 4px}
.mode-row{display:flex;align-items:center;gap:3px;padding:1px 6px 1px 14px}
.mode-btn{background:none;border:1px solid transparent;color:var(--t3);border-radius:3px;padding:2px 6px;cursor:pointer;font-size:10px;flex:1;text-align:left;transition:color .3s ease,background .3s ease,border-color .3s ease;white-space:nowrap;line-height:1.5}
.mode-btn:hover{border-color:var(--border);color:var(--t2)}
.mode-btn.active{color:var(--green);border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04)}
.oa-btn{background:none;border:1px solid transparent;color:var(--t3);border-radius:3px;padding:2px 5px;cursor:pointer;font-size:9px;min-width:22px;text-align:center;transition:color .3s ease,background .3s ease,border-color .3s ease}
.oa-btn:hover{border-color:var(--border)}
.oa-btn.active{color:var(--purple);border-color:rgba(168,85,247,.25);background:rgba(168,85,247,.04)}
.oanda-section{padding:6px 10px;margin-top:auto;border-top:1px solid var(--border)}
#oanda-status{font-size:10px;color:var(--t3);transition:color .3s ease}

/* ── Main Content ── */
.main{overflow:hidden;display:flex;flex-direction:column}
.tf-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0}
.tf-tabs{display:flex;gap:3px}
.tf-btn{background:none;border:1px solid var(--border);color:var(--t3);border-radius:3px;padding:2px 9px;cursor:pointer;font-size:10px;transition:all .12s}
.tf-btn:hover{color:var(--t2)}
.tf-btn.active{color:var(--blue);border-color:var(--blue);background:rgba(59,130,246,.08)}
#chart-title{font-size:12px;font-weight:600;color:var(--t2)}
#main-chart{flex:1;min-height:250px}
.tv-lightweight-charts{max-width:100%!important}

/* ── Stats Filter ── */
.stats-filter{display:flex;align-items:center;gap:6px;padding:4px 14px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.stats-filter input[type="date"]{background:var(--bg1);color:var(--t1);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:10px;font-family:inherit;width:110px}
.stats-filter input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.7)}
.sf-sep{color:var(--t3);font-size:10px}
.sf-quick{display:flex;gap:2px}
.sf-btn{background:var(--bg1);color:var(--t2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:9px;cursor:pointer;font-family:inherit;transition:all .15s}
.sf-btn:hover{background:var(--border)}
.sf-btn.sf-active{background:var(--blue);color:#fff;border-color:var(--blue)}
#sf-mode{background:var(--bg1);color:var(--t1);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:10px;font-family:inherit;margin-left:auto}
/* ── Stats Bar ── */
.stats-bar{display:flex;align-items:center;gap:20px;padding:5px 14px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0}
.stat-label{display:block;font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;line-height:1}
.stat-val{font-size:13px;font-weight:700;line-height:1.4}

/* ── Bottom Panels ── */
.bottom{flex-shrink:0;max-height:40vh;overflow-y:auto}
.bottom::-webkit-scrollbar{width:4px}
.bottom::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;font-size:11px;font-weight:600;color:var(--t2);background:var(--bg2);border-bottom:1px solid var(--border)}

/* Open Positions — Card layout */
#open-positions{border-bottom:1px solid var(--border)}
.pos-card{padding:8px 12px;border-bottom:1px solid rgba(48,54,61,.3);display:grid;grid-template-columns:1fr auto;gap:4px 10px;align-items:center}
.pos-card:first-of-type{animation:tl-new .4s ease}
.pos-top{display:flex;align-items:center;gap:6px}
.pos-flag{font-size:18px;line-height:1}
.pos-pair-name{font-size:14px;font-weight:800;letter-spacing:.3px;color:var(--t1)}
.pos-dir{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px}
.pos-dir.buy{background:rgba(34,197,94,.15);color:var(--green)}
.pos-dir.sell{background:rgba(239,68,68,.15);color:var(--red)}
.pos-mode-tag{font-size:9px;color:var(--t3);font-weight:600}
.pos-pnl-area{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.pos-pnl-badge{font-size:14px;font-weight:800;padding:3px 10px;border-radius:6px;font-variant-numeric:tabular-nums;letter-spacing:.3px;min-width:72px;text-align:center}
.pos-pnl-badge.win{background:rgba(34,197,94,.18);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.pos-pnl-badge.lose{background:rgba(239,68,68,.18);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.pos-pnl-badge.flat{background:rgba(139,148,158,.1);color:var(--t2);border:1px solid rgba(139,148,158,.2)}
.pos-amount{font-size:10px;font-weight:600;font-variant-numeric:tabular-nums}
.pos-amount.win{color:#4ade80}.pos-amount.lose{color:#f87171}.pos-amount.flat{color:var(--t3)}
.pos-detail{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--t3);white-space:nowrap}
.pos-sl{color:var(--red)}.pos-tp{color:var(--green)}
.pos-entry{color:var(--t2);font-variant-numeric:tabular-nums}
.pos-type{color:var(--t3);font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.pos-hold{font-size:9px;font-variant-numeric:tabular-nums;transition:color .3s ease;white-space:nowrap;text-align:right}
.btn-s{background:none;border:1px solid;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:9px;transition:opacity .15s}
.btn-s:hover{opacity:.7}

/* Strategy Panel */
#strategy-panel{border-bottom:1px solid var(--border);max-height:160px;overflow-y:auto}
.strat-cat{padding:2px 10px;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;background:rgba(0,0,0,.25)}
.strat-row{padding:2px 10px;font-size:10px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.strat-row.smc{background:rgba(234,179,8,.025)}
.badge{display:inline-block;padding:0 4px;border-radius:2px;font-size:8px;font-weight:700;line-height:1.6}
.badge-smc{background:rgba(234,179,8,.12);color:var(--gold);border:1px solid rgba(234,179,8,.25)}
.badge-on{background:rgba(34,197,94,.1);color:var(--green)}
.badge-off{color:var(--t3)}
.badge-blocked{background:rgba(239,68,68,.1);color:var(--red)}
.badge-promo{background:rgba(59,130,246,.1);color:var(--blue)}
.badge-demote{background:rgba(239,68,68,.1);color:var(--red)}
.strat-metrics{font-size:9px;color:var(--t3);margin-left:auto}

/* Log */
#log-panel{border-bottom:1px solid var(--border)}
#demo-log{max-height:110px;overflow-y:auto;padding:3px 10px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:10px;line-height:1.55}
#demo-log::-webkit-scrollbar{width:4px}
#demo-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.log-line{color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-entry{color:var(--blue)}.log-win{color:var(--green)}.log-loss{color:var(--red)}.log-start{color:var(--purple)}

/* ── Lamp Indicators (CSS-only, zero DOM churn) ── */
.lamp{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:3px;vertical-align:middle;transition:background .3s ease,box-shadow .3s ease}
.lamp.live{background:var(--green);box-shadow:0 0 4px var(--green)}
.lamp.demo{background:var(--gold);box-shadow:0 0 3px rgba(234,179,8,.5)}
.lamp.off{background:var(--t3);box-shadow:none}
#oanda-status.oa-active{color:var(--purple)}

/* ── Trade Log (3段構成: Line1=ペア+戦略, Line2=理由ラベル+損益, Line3=分析) ── */
#trade-log-panel{border-bottom:1px solid var(--border)}
#trade-log{max-height:280px;overflow-y:auto;padding:3px 10px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:10px;line-height:1.5}
#trade-log::-webkit-scrollbar{width:4px}
#trade-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tl-row{padding:6px 0;border-bottom:1px solid rgba(48,54,61,.2)}
.tl-row:first-child{animation:tl-new .5s ease}
@keyframes tl-new{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.tl-line1{display:flex;align-items:center;gap:5px;white-space:nowrap}
.tl-pair{font-weight:700;font-size:11px;color:var(--t1)}
.tl-strat{font-weight:600;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto;flex-shrink:0}
.tl-strat-smc{background:rgba(255,180,50,.15);color:var(--gold)}
.tl-strat-scalp{background:rgba(88,166,255,.15);color:var(--blue)}
.tl-strat-dt{background:rgba(139,148,158,.1);color:var(--t2)}
.tl-strat-1h{background:rgba(163,113,247,.15);color:var(--purple)}
.tl-line2{display:flex;align-items:center;gap:6px;margin-top:3px;font-size:9px;white-space:nowrap}
.tl-time{color:var(--t3);font-variant-numeric:tabular-nums}
.tl-dur{color:var(--t2)}
.tl-result{font-weight:700;min-width:50px;text-align:right;margin-left:auto;flex-shrink:0}
/* ── Close Reason Labels (最も目に飛び込むデザイン) ── */
.tl-reason{display:inline-block;font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase;flex-shrink:0}
.tl-reason-sl{background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.35)}
.tl-reason-tp{background:rgba(34,197,94,.2);color:#4ade80;border:1px solid rgba(34,197,94,.35)}
.tl-reason-time{background:rgba(234,179,8,.15);color:var(--gold);border:1px solid rgba(234,179,8,.3)}
.tl-reason-spread{background:rgba(139,148,158,.12);color:var(--t2);border:1px solid rgba(139,148,158,.25)}
.tl-reason-reverse{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.tl-reason-other{background:rgba(139,148,158,.08);color:var(--t3);border:1px solid rgba(139,148,158,.15)}
.tl-line3{margin-top:3px;font-size:9px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-line3 b{color:var(--gold);font-weight:600}
@media(max-width:600px){.tl-line1{flex-wrap:wrap}.tl-strat{margin-left:0}}

/* ── Mobile OANDA Panel (desktop: hidden) ── */
.mob-oa{display:none}
.mob-oa-detail{display:none}

/* ── Mobile ── */
@media(max-width:768px){
  .cockpit{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{flex-direction:row;overflow-x:auto;overflow-y:hidden;border-right:none;border-bottom:1px solid var(--border);max-height:70px}
  .sidebar::-webkit-scrollbar{height:3px}
  .pair-group{display:flex;align-items:center;border-bottom:none;border-right:1px solid var(--border);flex-shrink:0;padding:4px 0}
  .pair-header{padding:4px 8px;border-left:none;border-bottom:2px solid transparent;font-size:10px}
  .pair-header.active{border-left-color:transparent;border-bottom-color:var(--blue)}
  .mode-list{display:flex;padding:0 4px;gap:2px}
  .mode-row{padding:0}
  .oa-btn{display:none}
  .oanda-section{display:none}
  #main-chart{min-height:200px}
  .stats-bar{gap:12px;padding:4px 8px}
  .stat-val{font-size:11px}
  .pos-card{padding:6px 10px}
  .pos-pair-name{font-size:12px}
  .pos-pnl-badge{font-size:12px;padding:2px 8px;min-width:60px}
  .pos-detail{flex-wrap:wrap;gap:4px}
  /* ── Mobile OANDA Emergency Panel ── */
  .mob-oa{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    min-height:48px;background:var(--bg1);border-top:2px solid var(--border);
    align-items:center;justify-content:space-between;
    padding:6px 12px calc(6px + env(safe-area-inset-bottom, 0px)) 12px;
    z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.5);
  }
  .mob-oa-left{display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;-webkit-tap-highlight-color:transparent}
  .mob-oa-label{font-size:12px;font-weight:600;color:var(--t2);transition:color .3s ease}
  .mob-oa-label.live{color:var(--purple)}
  .mob-oa-cnt{font-size:10px;color:var(--gold);font-weight:700}
  .mob-oa-kill{
    background:var(--red);color:white;border:none;border-radius:6px;
    padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;
    min-height:36px;min-width:70px;transition:opacity .2s ease,background .3s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .mob-oa-kill:active{opacity:.7}
  .mob-oa-kill.safe{background:var(--t3);color:var(--t2)}
  .mob-oa-detail{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--bg1);border-top:2px solid var(--purple);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom, 0px)) 12px;
    z-index:201;box-shadow:0 -4px 16px rgba(0,0,0,.6);
    max-height:60vh;overflow-y:auto;
  }
  .mob-oa-detail.open{display:block}
  .mob-oa-detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .mob-oa-detail-title{font-size:13px;font-weight:700;color:var(--t1)}
  .mob-oa-close{background:none;border:1px solid var(--border);color:var(--t2);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:11px;-webkit-tap-highlight-color:transparent}
  .mob-oa-mode{display:flex;align-items:center;justify-content:space-between;padding:10px 4px;border-bottom:1px solid var(--border)}
  .mob-oa-mode-name{font-size:12px;color:var(--t1);display:flex;align-items:center;gap:5px}
  .mob-oa-toggle{
    position:relative;width:44px;height:24px;border-radius:12px;
    border:none;cursor:pointer;transition:background .3s ease;
    background:var(--t3);-webkit-tap-highlight-color:transparent;
  }
  .mob-oa-toggle.on{background:var(--purple)}
  .mob-oa-toggle::after{
    content:'';position:absolute;top:2px;left:2px;
    width:20px;height:20px;border-radius:50%;
    background:white;transition:transform .3s ease;
  }
  .mob-oa-toggle.on::after{transform:translateX(20px)}
  .mob-oa-toggle:disabled{opacity:.3;cursor:default}
  .cockpit{height:calc(100vh - 42px - 52px)}
  .bottom{padding-bottom:56px}
}
</style>
</head>
<body>

<!-- ═══ Top Bar ═══ -->
<header class="topbar">
  <h1>🧠 FX AI Cockpit</h1>
  <div class="topbar-r">
    <a href="/">📈 Main</a>
    <a href="/oanda-analysis">💹 OANDA</a>
    <span id="status-text"><span class="dot off" id="status-dot"></span><span id="status-label">—</span></span>
    <button class="tb" onclick="runLearning()" title="学習エンジン実行">🧠</button>
    <button class="tb" onclick="loadAll()" title="全データ再読込">🔄</button>
  </div>
</header>

<!-- ═══ Cockpit Grid ═══ -->
<div class="cockpit">

<!-- ── Sidebar: Pair & Mode Control ── -->
<aside class="sidebar" id="sidebar">

  <!-- USD/JPY -->
  <div class="pair-group">
    <div class="pair-header active" data-pair="USD_JPY" onclick="selectPair('USD_JPY')">
      <span class="pair-flag">🇺🇸🇯🇵</span> USD/JPY
    </div>
    <div class="mode-list">
      <div class="mode-row"><button id="m-scalp" class="mode-btn" onclick="toggleDemo('scalp')">⚡SC <span class="lamp off"></span></button><button id="o-scalp" class="oa-btn" onclick="toggleOandaMode('scalp')">OA</button></div>
      <div class="mode-row"><button id="m-daytrade" class="mode-btn" onclick="toggleDemo('daytrade')">📊DT <span class="lamp off"></span></button><button id="o-daytrade" class="oa-btn" onclick="toggleOandaMode('daytrade')">OA</button></div>
      <div class="mode-row"><button id="m-daytrade_1h" class="mode-btn" onclick="toggleDemo('daytrade_1h')">🕐1H <span class="lamp off"></span></button><button id="o-daytrade_1h" class="oa-btn" onclick="toggleOandaMode('daytrade_1h')">OA</button></div>
      <div class="mode-row"><button id="m-rnb_usdjpy" class="mode-btn" onclick="toggleDemo('rnb_usdjpy')">🎯RNB <span class="lamp off"></span></button><button id="o-rnb_usdjpy" class="oa-btn" onclick="toggleOandaMode('rnb_usdjpy')">OA</button></div>
    </div>
  </div>

  <!-- EUR/USD -->
  <div class="pair-group">
    <div class="pair-header" data-pair="EUR_USD" onclick="selectPair('EUR_USD')">
      <span class="pair-flag">🇪🇺🇺🇸</span> EUR/USD
    </div>
    <div class="mode-list">
      <div class="mode-row"><button id="m-scalp_eur" class="mode-btn" onclick="toggleDemo('scalp_eur')">⚡SC <span class="lamp off"></span></button><button id="o-scalp_eur" class="oa-btn" onclick="toggleOandaMode('scalp_eur')">OA</button></div>
      <div class="mode-row"><button id="m-daytrade_eur" class="mode-btn" onclick="toggleDemo('daytrade_eur')">📊DT <span class="lamp off"></span></button><button id="o-daytrade_eur" class="oa-btn" onclick="toggleOandaMode('daytrade_eur')">OA</button></div>
      <div class="mode-row"><button id="m-daytrade_1h_eur" class="mode-btn" onclick="toggleDemo('daytrade_1h_eur')">🕐1H <span class="lamp off"></span></button><button id="o-daytrade_1h_eur" class="oa-btn" onclick="toggleOandaMode('daytrade_1h_eur')">OA</button></div>
    </div>
  </div>

  <!-- EUR/JPY -->
  <div class="pair-group">
    <div class="pair-header" data-pair="EUR_JPY" onclick="selectPair('EUR_JPY')">
      <span class="pair-flag">🇪🇺🇯🇵</span> EUR/JPY
    </div>
    <div class="mode-list">
      <div class="mode-row"><button id="m-scalp_eurjpy" class="mode-btn" onclick="toggleDemo('scalp_eurjpy')">⚡SC <span class="lamp off"></span></button><button id="o-scalp_eurjpy" class="oa-btn" onclick="toggleOandaMode('scalp_eurjpy')">OA</button></div>
    </div>
  </div>

  <!-- GBP/USD -->
  <div class="pair-group">
    <div class="pair-header" data-pair="GBP_USD" onclick="selectPair('GBP_USD')">
      <span class="pair-flag">🇬🇧🇺🇸</span> GBP/USD

function initChart(){

async function loadChart(){
  const pi=PAIRS[_currentPair];
  if(!pi)return;
  try{
    // ── Fetch candles ──
    const r=await fetch(`/api/chart-data?tf=${_currentTf}&symbol=${pi.symbol}`);
    const d=await r.json();
    if(!d.candles||!d.candles.length){_series.setData([]);return}

    // Deduplicate + sort
    const seen=new Set();const candles=[];
    for(const c of d.candles){if(!seen.has(c.time)){seen.add(c.time);candles.push(c)}}
    candles.sort((a,b)=>a.time-b.time);

    // Price format
    const mm=pi.precision===2?0.01:pi.precision===3?0.001:0.00001;
    _series.applyOptions({priceFormat:{type:'price',precision:pi.precision,minMove:mm}});
    _series.setData(candles);
    _chart.timeScale().fitContent();

    // ── OB Zones ──
    clearLines(_obLines);
    _obLines=drawOBs(detectOBs(candles));

    // ── Trade Markers ──
    const tr=await fetch(`/api/demo/trades?limit=50&status=closed`);
    const td=await tr.json();
    const trades=(td.trades||[]).filter(t=>pi.modes.includes(t.mode));
    drawMarkers(trades,candles);

    // ── Open Position Lines ──
    clearLines(_posLines);
    const openForPair=(_lastOpenTrades||[]).filter(t=>pi.modes.includes(t.mode));
    _posLines=drawPosLines(openForPair);

  }catch(e){console.warn('[Chart]',e)}
}

// ── OB Detection ──
function detectOBs(candles){
  if(candles.length<5)return[];
  const obs=[];
  let totalBody=0;
  for(const c of candles)totalBody+=Math.abs(c.close-c.open);
  const avg=totalBody/candles.length;
  const thr=avg*0.4;
  for(let i=1;i<candles.length-2;i++){
    const c=candles[i],n=candles[i+1];
    const body=Math.abs(c.close-c.open);
    if(body<thr)continue;
    // Bullish OB: bearish candle + next closes above its open
    if(c.close<c.open&&n.close>c.open){
      obs.push({type:'bull',top:c.open,bottom:c.close,time:c.time});
    }
    // Bearish OB: bullish candle + next closes below its open
    if(c.close>c.open&&n.close<c.open){
      obs.push({type:'bear',top:c.close,bottom:c.open,time:c.time});
    }
  }
  return obs.slice(-4);
}

function drawOBs(obs){
  const lines=[];
  for(const ob of obs){
    const col=ob.type==='bull'?'rgba(34,197,94,0.35)':'rgba(239,68,68,0.35)';
    const lbl=ob.type==='bull'?'Bull OB':'Bear OB';
    lines.push(_series.createPriceLine({price:ob.top,color:col,lineWidth:1,
      lineStyle:LightweightCharts.LineStyle.Dashed,axisLabelVisible:false,title:lbl}));
    lines.push(_series.createPriceLine({price:ob.bottom,color:col,lineWidth:1,
      lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:false,title:''}));
  }
  return lines;
}

function drawPosLines(trades){
  const lines=[];
  for(const t of trades){
    const isBuy=t.direction==='BUY';
    if(t.entry_price)lines.push(_series.createPriceLine({
      price:t.entry_price,color:isBuy?'#3b82f6':'#f59e0b',lineWidth:1,
      lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:true,
      title:`${t.direction} Entry`}));
    if(t.sl)lines.push(_series.createPriceLine({
      price:t.sl,color:'#ef4444',lineWidth:1,
      lineStyle:LightweightCharts.LineStyle.Dashed,axisLabelVisible:true,title:'SL'}));
    if(t.tp)lines.push(_series.createPriceLine({
      price:t.tp,color:'#22c55e',lineWidth:1,
      lineStyle:LightweightCharts.LineStyle.Dashed,axisLabelVisible:true,title:'TP'}));
  }
  return lines;
}

function drawMarkers(trades,candles){
  if(!trades.length){_series.setMarkers([]);return}
  const times=candles.map(c=>c.time);
  const markers=[];
  function nearest(t){let best=times[0],diff=Math.abs(times[0]-t);
    for(const ct of times){const d=Math.abs(ct-t);if(d<diff){diff=d;best=ct}}return best}
  for(const t of trades){
    const et=_iso2unix(t.entry_time);
    if(et){markers.push({time:nearest(et),
      position:t.direction==='BUY'?'belowBar':'aboveBar',
      color:t.direction==='BUY'?'#22c55e':'#ef4444',
      shape:t.direction==='BUY'?'arrowUp':'arrowDown',
      text:t.direction==='BUY'?'B':'S'})}
    if(t.exit_time){const xt=_iso2unix(t.exit_time);
      const isWin=t.outcome==='WIN';
      markers.push({time:nearest(xt),
        position:t.direction==='BUY'?'aboveBar':'belowBar',
        color:isWin?'#22c55e':'#ef4444',shape:'circle',
        text:`${(t.pnl_pips||0)>=0?'+':''}${(t.pnl_pips||0).toFixed(1)}`})}
  }
  markers.sort((a,b)=>a.time-b.time);
  // Dedupe same time+position
  const uniq=[];const seen=new Set();
  for(const m of markers){const k=`${m.time}_${m.position}_${m.text}`;
    if(!seen.has(k)){seen.add(k);uniq.push(m)}}
  _series.setMarkers(uniq);
}

function clearLines(arr){for(const l of arr){try{_series.removePriceLine(l)}catch(e){}}arr.length=0}

async function loadDemoStatus(){
  if(_statusInFlight)return;
  _statusInFlight=true;
  try{
    const ctrl=new AbortController();
    const to=setTimeout(()=>ctrl.abort(),4000);
    const r=await fetch('/api/demo/status',{signal:ctrl.signal});
    clearTimeout(to);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();

    // ── ログ件数チェック (常に独立実行=スナップショット非依存で確実キャッチ) ──
    const slc=d.log_count||0;
    document.getElementById('log-count').textContent=slc;
    if(slc>0&&slc!==_lastLogCount){_lastLogCount=slc;loadLogs();loadTradeLog()}

    // ── ポジション数変化チェック → 決済検出で TradeLog 即時更新 ──
    const openCount=(d.open_trades||[]).length;
    if(_lastOpenCount>=0&&openCount<_lastOpenCount) loadTradeLog();
    _lastOpenCount=openCount;

    // ── Grace Period: モード一時欠落を3回まで許容 ──
    const newModes=d.modes||{};
    for(const mode of Object.keys(_modeStates)){
      if(!(mode in newModes)){
        _modeGrace[mode]=(_modeGrace[mode]||0)+1;
        if(_modeGrace[mode]<3) newModes[mode]=_modeStates[mode]; // 旧状態保持
      }else{
        _modeGrace[mode]=0;
      }
    }
    _modeStates=newModes;
    _oandaStatus=d.oanda||{};
    _lastOpenTrades=d.open_trades||[];

    updateSidebar();
    updateStatusText();
    updatePositions(_lastOpenTrades);
    renderStrategies(d.strategy_status||[]);
  }catch(e){
    if(e.name!=='AbortError')console.warn('[Status]',e);
  }finally{_statusInFlight=false}
}

// ── Close Reason → Label mapping ──
function _reasonLabel(reason){
  if(!reason)return '';
  const r=reason.toUpperCase();
  if(r.includes('SL_HIT')||r.includes('逆行'))return `<span class="tl-reason tl-reason-sl">SL HIT</span>`;
  if(r.includes('TP_HIT')||r.includes('TP到達'))return `<span class="tl-reason tl-reason-tp">TP HIT</span>`;
  if(r.includes('MAX_HOLD')||r.includes('TIME_DECAY')||r.includes('最大保持'))return `<span class="tl-reason tl-reason-time">TIME EXIT</span>`;
  if(r.includes('SPREAD')||r.includes('スプレッド'))return `<span class="tl-reason tl-reason-spread">SPREAD</span>`;
  if(r.includes('SIGNAL_REVERSE')||r.includes('反転'))return `<span class="tl-reason tl-reason-reverse">REVERSE</span>`;
  if(r.includes('SCENARIO_INVALID'))return `<span class="tl-reason tl-reason-sl">INVALID</span>`;
  if(r.includes('WEEKEND'))return `<span class="tl-reason tl-reason-time">WEEKEND</span>`;
  return `<span class="tl-reason tl-reason-other">${reason.slice(0,12)}</span>`;
}

async function loadTradeLog(){
  try{
    const p=[];
    if(_statsFilter.dateFrom)p.push(`date_from=${_statsFilter.dateFrom}`);
    if(_statsFilter.dateTo)p.push(`date_to=${_statsFilter.dateTo}`);
    if(_statsFilter.mode)p.push(`mode=${encodeURIComponent(_statsFilter.mode)}`);
    const hasFilter=_statsFilter.dateFrom||_statsFilter.dateTo||_statsFilter.mode;
    if(hasFilter)p.push('limit=200');
    const url='/api/demo/trade-log'+(p.length?'?'+p.join('&'):'');
    const r=await fetch(url);
    const d=await r.json();
    const trades=d.trades||[];
    // ── 堅牢な変更検知: 最新ID + 件数のみ (シンプル&確実) ──
    const latestId=trades.length?trades[0].trade_id:'';
    const latestLen=trades.length;
    if(latestId===_lastTlId&&latestLen===_lastTlLen)return;
    _lastTlId=latestId;_lastTlLen=latestLen;
    const el=document.getElementById('trade-log');
    if(!el)return;
    const cnt=document.getElementById('tl-count');
    if(cnt){const nv=String(latestLen);if(cnt.textContent!==nv)cnt.textContent=nv}
    const PI={'USD_JPY':{i:'💴',n:'USD/JPY'},'EUR_USD':{i:'💶',n:'EUR/USD'},
              'GBP_USD':{i:'💷',n:'GBP/USD'},'EUR_GBP':{i:'🇪🇺🇬🇧',n:'EUR/GBP'},
              'XAU_USD':{i:'🥇',n:'XAU/USD'},'EUR_JPY':{i:'💶💴',n:'EUR/JPY'}};
    el.innerHTML=trades.map(t=>{
      const pi=PI[t.instrument]||{i:'📊',n:t.instrument||'?'};
      // ── 戦略名 + カテゴリ色分け ──
      const smc=SMC_SET.has(t.entry_type);
      const name=smc?`🛡${SNAME[t.entry_type]||t.entry_type}`:(SNAME[t.entry_type]||t.entry_type||'?');
      let sc='tl-strat-dt';
      if(smc) sc='tl-strat-smc';
      else if(t.mode&&t.mode.startsWith('scalp')) sc='tl-strat-scalp';
      else if(t.mode&&t.mode.includes('1h')) sc='tl-strat-1h';
      // ── 損益 ──
      const pnl=(t.pnl_pips||0);
      const col=t.outcome==='WIN'?'var(--green)':pnl<-0.5?'var(--red)':'var(--t2)';
      const ps=`${pnl>=0?'+':''}${pnl.toFixed(1)}p`;
      // ── 決済理由ラベル (最も目立つ要素) ──
      const closeR=t.close_reason||'';
      const reasonHtml=_reasonLabel(closeR);
      // ── 日時: MM/DD HH:MM - MM/DD HH:MM (duration) ──
      let timeStr='',durStr='';
      if(t.entry_time&&t.exit_time){
        const eIn=new Date(t.entry_time),eOut=new Date(t.exit_time);
        const p2=n=>String(n).padStart(2,'0');
        timeStr=`${p2(eIn.getUTCMonth()+1)}/${p2(eIn.getUTCDate())} ${p2(eIn.getUTCHours())}:${p2(eIn.getUTCMinutes())} - ${p2(eOut.getUTCMonth()+1)}/${p2(eOut.getUTCDate())} ${p2(eOut.getUTCHours())}:${p2(eOut.getUTCMinutes())}`;
        durStr=_fmtDur(Math.max(0,Math.floor((eOut-eIn)/1000)));
      }else if(t.exit_time){
        const eOut=new Date(t.exit_time);
        const p2=n=>String(n).padStart(2,'0');
        timeStr=`${p2(eOut.getUTCMonth()+1)}/${p2(eOut.getUTCDate())} ${p2(eOut.getUTCHours())}:${p2(eOut.getUTCMinutes())}`;
      }
      // ── 分析 (常時表示: entry理由 → exit分析) ──
      let reasons=t.reasons||[];
      if(typeof reasons==='string'){try{reasons=JSON.parse(reasons)}catch(e){reasons=[]}}
      const rText=reasons.filter(r=>typeof r==='string'&&!r.startsWith('__')).map(r=>r.replace(/^✅\s*/,'')).slice(0,4).join(', ');
      const exitText=t.close_analysis||'';
      const parts=[rText,exitText].filter(Boolean);
      const analysisHtml=parts.length?`<div class="tl-line3"><b>${t.outcome==='WIN'?'&#9733;':'&#9679;'}</b> ${_h(parts.join(' → '))}</div>`:'';
      // ── 3段レイアウト: Line1=ペア+戦略, Line2=理由ラベル+日時+損益, Line3=分析 ──
      return `<div class="tl-row">`
        +`<div class="tl-line1"><span class="tl-pair">${pi.i} ${pi.n}</span>`
        +`<span class="tl-strat ${sc}">${_h(name)} ${t.direction||''}</span></div>`
        +`<div class="tl-line2">${reasonHtml}`
        +`${timeStr?`<span class="tl-time">${timeStr}</span>`:''}`
        +`${durStr?`<span class="tl-dur">(${durStr})</span>`:''}`
        +`<span class="tl-result" style="color:${col}">${ps}</span></div>`
        +analysisHtml+`</div>`;
    }).join('');
  }catch(e){console.warn('[TLog]',e)}
}

function renderStrategies(strategies){
  if(!strategies||!strategies.length)return;
  const panel=document.getElementById('strategy-panel');
  if(!panel)return;
  const hash=JSON.stringify(strategies);
  if(hash===_lastStratHash)return;
  _lastStratHash=hash;

  const groups={daytrade:[],scalp:[],'1h':[]};
  for(const s of strategies)(groups[s.category]||groups.daytrade).push(s);
  const catLabel={daytrade:'DT',scalp:'SC','1h':'1H'};

  let html='<div class="panel-hdr"><span>🎯 Strategies</span></div>';
  for(const[cat,strats]of Object.entries(groups)){
    if(!strats.length)continue;
    html+=`<div class="strat-cat">${catLabel[cat]||cat}</div>`;
    html+=strats.map(s=>{
      const name=SNAME[s.name]||s.name;
      const isSMC=s.smc_protected;
      let badges='';
      if(isSMC)badges+='<span class="badge badge-smc">🛡SMC</span> ';
      badges+=s.enabled?'<span class="badge badge-on">ON</span>':'<span class="badge badge-off">OFF</span>';
      if(s.blacklisted)badges+=' <span class="badge badge-blocked">BLOCKED</span>';
      if(s.promotion==='promoted')badges+=' <span class="badge badge-promo">PROMO</span>';
      if(s.promotion==='demoted')badges+=' <span class="badge badge-demote">DEMOTE</span>';
      const met=s.promo_n>0?
        `<span class="strat-metrics">N=${s.promo_n} WR=${s.promo_wr}% EV=${s.promo_ev>=0?'+':''}${s.promo_ev.toFixed(2)}</span>`:'';
      return `<div class="strat-row${isSMC?' smc':''}">${name} ${badges} ${met}</div>`;
    }).join('');
  }
  // SMC summary
  const smcCount=strategies.filter(s=>s.smc_protected).length;
  const activeCount=strategies.filter(s=>s.enabled).length;
  html+=`<div style="padding:3px 10px;font-size:9px;color:var(--t3)">🛡 SMC Protected: ${smcCount} | Active: ${activeCount}/${strategies.length}</div>`;
  panel.innerHTML=html;
}

// ═══ Hold Timer (1-second real-time countdown) ════════

function _fmtDur(sec){
  if(sec<0)sec=0;
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);
  if(h>0)return `${h}h${String(m).padStart(2,'0')}m`;
  const s=Math.floor(sec%60);
  return m>0?`${m}m${String(s).padStart(2,'0')}s`:`${s}s`;
}
function _updateHoldTimers(){
  const spans=document.querySelectorAll('.pos-hold');
  if(!spans.length)return;
  const now=Date.now()/1000;
  spans.forEach(sp=>{
    const entry=sp.dataset.entry;
    const max=parseFloat(sp.dataset.max)||28800;
    if(!entry){sp.textContent='--';return}
    const entryTs=new Date(entry).getTime()/1000;
    if(isNaN(entryTs)){sp.textContent='--';return}
    const elapsed=now-entryTs;
    const remain=max-elapsed;
    const ratio=elapsed/max;
    sp.textContent=`${_fmtDur(elapsed)}/${_fmtDur(max)}`;
    // Color transitions: green <50%, gold 50-80%, red >80%
    if(ratio>=0.8){sp.style.color='var(--red)'}
    else if(ratio>=0.5){sp.style.color='var(--gold)'}
    else{sp.style.color='var(--green)'}
  });
}

function _applyStatsFilter(){
  _lastTlId=0;_lastTlLen=0; // force trade log refresh
  loadStats();loadTradeLog();
}
function _sfSetRange(range){
  document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('sf-active'));
  document.querySelector(`.sf-btn[data-range="${range}"]`)?.classList.add('sf-active');
  const now=new Date();
  let from='',to='';
  if(range==='today'){from=to=now.toISOString().slice(0,10)}
  else if(range==='7d'){to=now.toISOString().slice(0,10);from=new Date(now-7*864e5).toISOString().slice(0,10)}
  else if(range==='30d'){to=now.toISOString().slice(0,10);from=new Date(now-30*864e5).toISOString().slice(0,10)}
  document.getElementById('sf-from').value=from;
  document.getElementById('sf-to').value=to;
  _statsFilter.dateFrom=from;_statsFilter.dateTo=to;
  _applyStatsFilter();
}

document.addEventListener('DOMContentLoaded',()=>{
  initChart();
  loadAll();
  // Optimized intervals
  setInterval(loadDemoStatus,3000);      // Status+Log: 3s
  setInterval(()=>{loadChart();loadStats();loadTradeLog()},30000);  // Chart+Stats+TradeLog: 30s
  setInterval(_updateHoldTimers,1000);   // Hold timer: 1s real-time countdown

  // ── Stats Filter: Quick range buttons ──
  document.querySelectorAll('.sf-btn').forEach(btn=>{
    btn.addEventListener('click',()=>_sfSetRange(btn.dataset.range));
  });
  // ── Stats Filter: Date input changes ──
  ['sf-from','sf-to'].forEach(id=>{
    document.getElementById(id)?.addEventListener('change',()=>{
      document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('sf-active'));
      _statsFilter.dateFrom=document.getElementById('sf-from').value;
      _statsFilter.dateTo=document.getElementById('sf-to').value;
      _applyStatsFilter();
    });
  });
  // ── Stats Filter: Mode dropdown ──
  document.getElementById('sf-mode')?.addEventListener('change',e=>{
    _statsFilter.mode=e.target.value;
    _applyStatsFilter();
  });
});
</script>
</body>
