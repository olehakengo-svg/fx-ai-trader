name: Weekly Strategy Audit

on:
  schedule:
    # 毎週日曜 JST 11:00 = UTC 02:00
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      audit_type:
        description: 'Audit type (weekly or monthly)'
        required: false
        default: 'weekly'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine audit type
        id: audit-type
        run: |
          # 月初(1-7日)の日曜なら monthly、それ以外は weekly
          DAY=$(date -u +%d)
          INPUT_TYPE="${{ github.event.inputs.audit_type }}"
          if [ -n "$INPUT_TYPE" ]; then
            echo "type=$INPUT_TYPE" >> $GITHUB_OUTPUT
          elif [ "$DAY" -le 7 ]; then
            echo "type=monthly" >> $GITHUB_OUTPUT
          else
            echo "type=weekly" >> $GITHUB_OUTPUT
          fi

      - name: Run audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}
        run: python3 scripts/weekly_audit.py ${{ steps.audit-type.outputs.type }}

      - name: Commit KB audit
        id: kb-commit
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge-base/raw/audits/
          echo "=== Staged files ==="
          git diff --cached --name-only
          if git diff --cached --name-only | grep -q "knowledge-base/"; then
            git pull --rebase origin main
            git commit -m "docs(KB): ${{ steps.audit-type.outputs.type }} audit $(date -u +%Y-%m-%d)"
            git push
            echo "✅ KB committed"
          else
            echo "ℹ️ No KB changes to commit"
          fi

      - name: Notify KB commit result
        if: always()
        env:
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_ERROR_WEBHOOK_URL" ]; then exit 0; fi
          TYPE="${{ steps.audit-type.outputs.type }}"
          if [ "${{ steps.kb-commit.outcome }}" = "success" ]; then
            MSG="✅ **KB Commit** ${TYPE}-audit $(date -u +%Y-%m-%d) — git push 成功"
          else
            MSG="❌ **KB Commit FAILED** ${TYPE}-audit $(date -u +%Y-%m-%d) — git push 失敗"
          fi
          curl -s -X POST "$DISCORD_ERROR_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: FX-KB-Monitor/1.0" \
            -d "{\"content\": \"$MSG\"}" || true
