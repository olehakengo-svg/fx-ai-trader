name: Daily Trading Report

on:
  schedule:
    # セッションベース3回/日（平日のみ）
    - cron: '0 0 * * 1-5'    # Pre-Tokyo:   UTC 00:00 = JST 09:00
    - cron: '0 6 * * 1-5'    # Post-Tokyo:  UTC 06:00 = JST 15:00
    - cron: '0 16 * * 1-5'   # Post-London: UTC 16:00 = JST 01:00(翌日)
  workflow_dispatch:
    inputs:
      session:
        description: 'Session (pre_tokyo, post_tokyo, post_london) — empty for auto-detect'
        required: false
      note:
        description: '追加コンテキスト（任意）'
        required: false

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}
        run: python3 scripts/daily_report.py ${{ github.event.inputs.session }}

      - name: Commit KB report
        id: kb-commit
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge-base/raw/trade-logs/
          test -d knowledge-base/raw/market-analysis && git add knowledge-base/raw/market-analysis/ || true
          echo "=== Staged files ==="
          git diff --cached --name-only
          if git diff --cached --name-only | grep -q "knowledge-base/"; then
            git pull --rebase origin main
            git commit -m "docs(KB): daily report $(date -u +%Y-%m-%d)"
            git push
            echo "✅ KB committed"
          else
            echo "ℹ️ No KB changes to commit"
          fi

      - name: Notify KB commit result
        if: always()
        env:
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_ERROR_WEBHOOK_URL" ]; then exit 0; fi
          if [ "${{ steps.kb-commit.outcome }}" = "success" ]; then
            MSG="✅ **KB Commit** daily-report $(date -u +%Y-%m-%d) — git push 成功"
          else
            MSG="❌ **KB Commit FAILED** daily-report $(date -u +%Y-%m-%d) — git push 失敗。手動確認が必要"
          fi
          curl -s -X POST "$DISCORD_ERROR_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: FX-KB-Monitor/1.0" \
            -d "{\"content\": \"$MSG\"}" || true
