name: Daily Trading Report

on:
  schedule:
    # JST 09:00 = UTC 00:00 (毎朝マーケット前)
    # JST 17:00 = UTC 08:00 (ロンドン前夜・1日の振り返り)
    - cron: '0 0 * * 1-5'   # 平日朝 JST 09:00
    - cron: '0 8 * * 1-5'   # 平日夕 JST 17:00
  workflow_dispatch:          # 手動トリガー（いつでも実行可）
    inputs:
      note:
        description: '追加コンテキスト（任意）'
        required: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python3 scripts/daily_report.py

      - name: Commit KB report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge-base/raw/trade-logs/
          git diff --cached --quiet || {
            git pull --rebase origin main
            git commit -m "docs(KB): daily report $(date -u +%Y-%m-%d)"
            git push
          }
