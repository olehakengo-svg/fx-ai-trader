services:
  - type: web
    name: fx-ai-trader
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --threads 4 --worker-class gthread
    plan: starter
    disk:
      name: fx-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DB_PATH
        value: /var/data/demo_trades.db
