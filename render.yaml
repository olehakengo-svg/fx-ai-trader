services:
  - type: web
    name: fx-ai-trader
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 8 --worker-class gthread
    plan: pro
    disk:
      name: fx-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DB_PATH
        value: /var/data/demo_trades.db

  - type: worker
    name: fx-ai-discord-bot
    runtime: node
    rootDir: services/discord_bot
    buildCommand: bun install --frozen-lockfile
    startCommand: bun run bot.ts
    plan: starter
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DISCORD_ALLOWED_USERS
        sync: false

  # ===== Phase 1 (ACTIVE): LLM不要・α予算ゼロのバックグラウンド =====

  # Tier C: 異常検知・通知 (15分毎)
  # Protocol: knowledge-base/wiki/analyses/daily-tierB-protocol.md §6
  # 検知項目: spread spike / OANDA latency / session drift / Live N stagnation
  - type: cron
    name: fx-ai-tier-c-anomaly
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "*/15 * * * *"
    startCommand: python3 scripts/anomaly_watcher.py
    plan: starter
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: API_BASE
        value: https://fx-ai-trader.onrender.com

  # Tier A: quant gate status + α予算 要約 (1日1回 UTC 00:20)
  # daily_report.py の直前に実行 → gate状態を analyst に認識させる
  - type: cron
    name: fx-ai-tier-a-gate-status
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "20 0 * * *"
    startCommand: python3 tools/quant_gate_status.py --to-discord
    plan: starter
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false

  # Alpha Budget: 月初 reset (毎月1日 UTC 00:05)
  - type: cron
    name: fx-ai-alpha-budget-reset
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "5 0 1 * *"
    startCommand: python3 tools/alpha_budget_tracker.py --reset
    plan: starter

  # ===== Phase 2 (DRY-RUN only): LLM仮説生成 品質レビュー =====
  # scripts/daily_hypothesis_scan.py の run_bt_for_hypothesis() は skeleton。
  # --dry-run で α予算消費ゼロ・BTスキップ・仮説JSON出力のみ。
  # 本格運用 (BT+gate) は Phase 3 で startCommand から --dry-run を外す。
  #
  # 手動トリガ: Render Dashboard → fx-ai-tier-b-daily → "Trigger run now"

  - type: cron
    name: fx-ai-tier-b-daily
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "30 0 * * *"  # UTC 00:30 daily (JST 09:30)
    startCommand: python3 scripts/daily_hypothesis_scan.py --dry-run
    plan: starter
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: API_BASE
        value: https://fx-ai-trader.onrender.com

  # ===== Phase 3 (DISABLED): Tier B-weekly =====
  # Tier B-daily に正常な pass 候補が蓄積されてから有効化する。
  # 現状 pass は生まれない (dry-run かつ BT skeleton) のでコメントアウト維持。
  #
